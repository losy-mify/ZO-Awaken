name: 🖥️ Zo Computer 保活

on:
  workflow_dispatch:

jobs:
  awaken:
    name: 🔄 执行保活
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOST_PROXY: ${{ secrets.GOST_PROXY }}

    steps:
      # ── 1. 下载私库脚本 ───────────────────────────────────────
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ZO-Awaken-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      # ── 2. 移动脚本到工作目录 ─────────────────────────────────
      - name: 📂 移动脚本到工作目录
        run: mv private/zo-awaken.py zo-awaken.py

      # ── 3. 设置 Python ────────────────────────────────────────
      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 4. 启动 GOST 代理转发 ─────────────────────────────────
      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org | sed 's/\.[0-9]*$/.**/' && echo

      # ── 5. 安装系统依赖 ───────────────────────────────────────
      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot

      # ── 6. 安装 Python 依赖 ───────────────────────────────────
      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase
          seleniumbase install uc_driver

      # ── 7. 运行保活脚本 ───────────────────────────────────────
      - name: 🚀 运行保活脚本
        env:
          PYTHONIOENCODING: utf-8
          ZO_ACCOUNT: ${{ secrets.ZO_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python zo-awaken.py

      # ── 8. 上传截图与源码 ─────────────────────────────────────
      - name: 📸 上传截图与源码
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            *.png
            *.html
          retention-days: 7
